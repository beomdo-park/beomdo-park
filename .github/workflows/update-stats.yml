name: Update README stats

# README.md(또는 스크립트)가 바뀌어 push될 때마다 통계/타임스탬프를 자동 갱신합니다.
# 봇 커밋에는 [skip ci]가 붙어 무한 루프가 발생하지 않습니다.
on:
  push:
    branches: [ main ]
    paths:
      - 'README.md'
      - 'scripts/update-readme.mjs'
      - '.github/workflows/update-stats.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Recount & update README
        run: node scripts/update-readme.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain README.md)" ]; then
            git add README.md
            git commit -m "chore: auto-update stats & timestamp [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
